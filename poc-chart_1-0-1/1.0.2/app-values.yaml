# app-values.yaml
# The SUBSET of values.yaml that Devtron surfaces as the editable Deployment
# Template in the GUI (per app + per environment). A key is overridable from the
# GUI only if it appears here. Cluster-infra facts (canary.gateway.*,
# canary.metrics.*, global.imageRegistry) are deliberately left in values.yaml
# so operators can't repoint them per-app.

appName: poc-app

service:
  port: 9898

resources:
  requests: { cpu: 10m, memory: 32Mi }
  limits:   { cpu: 200m, memory: 128Mi }

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 99

# Flagger canary knobs — tunable per environment. The Gateway/Prometheus the
# canary points at stay in values.yaml (infra, not an app knob).
canary:
  enabled: true
  host: poc-app.example.com
  analysis:
    interval: 60s
    threshold: 5
    stepWeight: 20
    maxWeight: 40
    successRateMin: 99
    latencyMaxSeconds: 0.5
